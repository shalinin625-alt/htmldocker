apiVersion: apps/v1
kind: Deployment
metadata:
  name: factorial-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: factorial-app
  template:
    metadata:
      labels:
        app: factorial-app
    spec:
      containers:
      - name: factorial-container
        image: shalinin250/app:latest
        ports:
        - containerPort: 80